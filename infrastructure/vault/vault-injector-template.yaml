# Vault Agent Injector — Pod Annotation Şablonu
#
# Bu dosya dokümantasyon amaçlıdır.
# Her Kubernetes Deployment'ın spec.template.metadata.annotations bölümüne
# servise özel annotations eklenir.
#
# Kurulum:
#   helm install vault hashicorp/vault --namespace vault \
#     --set "injector.enabled=true" \
#     --set "server.ha.enabled=true"
#
# Kubernetes Auth Backend kurulumu:
#   vault auth enable kubernetes
#   vault write auth/kubernetes/config \
#     kubernetes_host="https://kubernetes.default.svc" \
#     kubernetes_ca_cert=@/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
#
#   vault write auth/kubernetes/role/enkap-services \
#     bound_service_account_names=enkap-sa \
#     bound_service_account_namespaces=enkap-production \
#     policies=enkap-services \
#     ttl=1h
---
# Örnek Deployment annotation bloğu:
#
# metadata:
#   annotations:
#     # Vault Agent sidecar etkinleştir
#     vault.hashicorp.com/agent-inject: "true"
#
#     # Kubernetes Auth role
#     vault.hashicorp.com/role: "enkap-services"
#
#     # JWT secrets → /vault/secrets/jwt.env dosyasına yaz
#     vault.hashicorp.com/agent-inject-secret-jwt: "enkap/production/jwt"
#     vault.hashicorp.com/agent-inject-template-jwt: |
#       {{- with secret "enkap/production/jwt" -}}
#       export JWT_PRIVATE_KEY="{{ .Data.data.private_key }}"
#       export JWT_PUBLIC_KEY="{{ .Data.data.public_key }}"
#       {{- end }}
#
#     # DB secrets → /vault/secrets/db.env
#     vault.hashicorp.com/agent-inject-secret-db: "enkap/production/database"
#     vault.hashicorp.com/agent-inject-template-db: |
#       {{- with secret "enkap/production/database" -}}
#       export DB_USERNAME="{{ .Data.data.username }}"
#       export DB_PASSWORD="{{ .Data.data.password }}"
#       {{- end }}
#
#     # Tenant encryption key (tenant bazında farklı)
#     vault.hashicorp.com/agent-inject-secret-tenant-key: "enkap/tenants/$(TENANT_ID)/encryption-key"
#
#     # Lease yenileme — 15 dakikada bir kontrol
#     vault.hashicorp.com/agent-pre-populate-only: "false"
#     vault.hashicorp.com/agent-revoke-on-shutdown: "true"
#     vault.hashicorp.com/agent-revoke-grace: "5s"
#
# ServiceAccount tanımı:
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: enkap-sa
  namespace: enkap-production
  annotations:
    # AWS IRSA veya GCP Workload Identity için ek annotation eklenebilir
    vault.hashicorp.com/agent-inject: "false"  # SA kendisi inject etmez
