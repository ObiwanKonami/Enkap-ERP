# ─── Prometheus Scraping ─────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: enkap-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: enkap-erp
  policyTypes:
    - Ingress
  ingress:
    # Prometheus pod'ları /metrics scrape yapabilir
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 9090   # Prometheus metrics port (varsa özel)
        - port: 3001   # auth-service /metrics
        - port: 3002   # tenant-service /metrics
        - port: 3003   # financial-service /metrics
        - port: 3004   # stock-service /metrics
        - port: 3007   # hr-service /metrics
        - port: 3008   # billing-service /metrics
        - port: 3009   # crm-service /metrics
        - port: 3010   # analytics-service /metrics
