# Servis Bazlı NetworkPolicy Kuralları
#
# Her servis için:
#   - Ingress: Sadece Kong ingress veya yetkili servislerden
#   - Egress:  Sadece ihtiyaç duyduğu bileşenlere (DB, Redis, RabbitMQ)
#
# Istio mTLS (strict) zaten servisler arası güven sağlar.
# NetworkPolicy → L3/L4 ağ seviyesi ek güvence (defense in depth).
#
# Label konvansiyonu:
#   app: <service-name>          (pod selector)
#   role: database / cache / mq (altyapı bileşenleri)

# ─── Auth Service (:3001) ────────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-netpol
  namespace: enkap-production
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Kong Gateway'den gelen istekler
    - from:
        - podSelector:
            matchLabels:
              app: kong-proxy
      ports:
        - port: 3001
  egress:
    # PostgreSQL (PgBouncer üzerinden)
    - to:
        - podSelector:
            matchLabels:
              app: pgbouncer
      ports:
        - port: 6432
    # Redis (JWT revokasyon, refresh token, şifre sıfırlama)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # SMTP (e-posta gönderimi)
    - ports:
        - port: 587
          protocol: TCP
        - port: 465
          protocol: TCP

# ─── Tenant Service (:3002) ──────────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: tenant-service-netpol
  namespace: enkap-production
spec:
  podSelector:
    matchLabels:
      app: tenant-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kong-proxy
      ports:
        - port: 3002
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: pgbouncer
      ports:
        - port: 6432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # RabbitMQ (tenant.provisioning.* olayları)
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - port: 5672
    # Billing service (onboarding → abonelik başlatma)
    - to:
        - podSelector:
            matchLabels:
              app: billing-service
      ports:
        - port: 3008

# ─── Financial Service (:3003) ───────────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: financial-service-netpol
  namespace: enkap-production
spec:
  podSelector:
    matchLabels:
      app: financial-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: kong-proxy
      ports:
        - port: 3003
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: pgbouncer
      ports:
        - port: 6432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # GİB signer servisi (Java, XAdES-T)
    - to:
        - podSelector:
            matchLabels:
              app: gib-signer
      ports:
        - port: 8080
    # GİB API (dış ağ — prod/test)
    - ports:
        - port: 443
          protocol: TCP
    # SMTP
    - ports:
        - port: 587
          protocol: TCP

