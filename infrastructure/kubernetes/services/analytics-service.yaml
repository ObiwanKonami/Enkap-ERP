apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: enkap-production
  labels:
    app: analytics-service
    version: v1
spec:
  # Analytics servisi düşük trafikli — 1 replica yeterli
  # Cron job leader election gerektirmez (idempotent ON CONFLICT)
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: analytics-service
        version: v1
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "enkap-services"
        prometheus.io/scrape: "true"
        prometheus.io/port: "3010"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: enkap-sa
      # Toplama işlemi ortasında kesilmesin (1000+ tenant)
      terminationGracePeriodSeconds: 120
      containers:
        - name: analytics-service
          image: ghcr.io/enkap/analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3010
              name: http
          envFrom:
            - configMapRef:
                name: enkap-config
            - secretRef:
                name: enkap-db-secrets
            - secretRef:
                name: enkap-app-secrets
          env:
            - name: PORT
              value: "3010"
          resources:
            # Analitik sorgular bellek yoğun olabilir
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3010
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: enkap-production
  labels:
    app: analytics-service
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
    - port: 3010
      targetPort: 3010
      name: http
---
# Analytics HPA — /admin endpoint'leri nadiren sorgulanır, düşük sınırlar
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: enkap-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
