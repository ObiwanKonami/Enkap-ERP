apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-service
  namespace: enkap-production
  labels:
    app: hr-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hr-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hr-service
        version: v1
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "enkap-services"
        # Bordro hesabı için DB şifresi
        vault.hashicorp.com/agent-inject-secret-db: "enkap/production/database"
        vault.hashicorp.com/agent-inject-template-db: |
          {{- with secret "enkap/production/database" -}}
          export DB_PASS="{{ .Data.data.app_password }}"
          {{- end }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "3007"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: enkap-sa
      terminationGracePeriodSeconds: 60   # Bordro hesabı ortasında kesilmesin
      containers:
        - name: hr-service
          image: ghcr.io/enkap/hr-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007
              name: http
          envFrom:
            - configMapRef:
                name: enkap-config
            - secretRef:
                name: enkap-db-secrets
            - secretRef:
                name: enkap-app-secrets
          env:
            - name: PORT
              value: "3007"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3007
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: hr-service
  namespace: enkap-production
  labels:
    app: hr-service
spec:
  type: ClusterIP
  selector:
    app: hr-service
  ports:
    - port: 3007
      targetPort: 3007
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hr-service-hpa
  namespace: enkap-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hr-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
