# External Secrets Operator — Vault → Kubernetes Secret köprüsü
#
# Mimari:
#   HashiCorp Vault (production secrets)
#     └── External Secrets Operator
#           └── Kubernetes Secret (pod'lara mount edilir)
#
# Hassas veriler K8s Secret YAML dosyasında asla saklanmaz.
# external-secrets.io CRD gerektirir (helm install external-secrets)
#
# Kurulum: helm install external-secrets external-secrets/external-secrets -n external-secrets-system
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: enkap-production
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "enkap-services"
          serviceAccountRef:
            name: "enkap-sa"
---
# Veritabanı şifreleri
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: enkap-db-secrets
  namespace: enkap-production
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: enkap-db-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: enkap/production/database
        property: password
    - secretKey: DB_USERNAME
      remoteRef:
        key: enkap/production/database
        property: username
    - secretKey: PGBOUNCER_PASSWORD
      remoteRef:
        key: enkap/production/pgbouncer
        property: password
---
# JWT ve uygulama sırları
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: enkap-app-secrets
  namespace: enkap-production
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: enkap-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: enkap/production/jwt
        property: private_key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: enkap/production/jwt
        property: public_key
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: enkap/production/redis
        property: password
    - secretKey: RABBITMQ_PASSWORD
      remoteRef:
        key: enkap/production/rabbitmq
        property: password
    - secretKey: GIB_USERNAME
      remoteRef:
        key: enkap/production/gib
        property: username
    - secretKey: GIB_PASSWORD
      remoteRef:
        key: enkap/production/gib
        property: password
    - secretKey: GIB_API_ENDPOINT
      remoteRef:
        key: enkap/production/gib
        property: api_endpoint
