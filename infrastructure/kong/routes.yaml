# Kong API Route Tanımları
#
# Tüm API'ler /api/v1/ prefix'i ile sergilenir.
# Mobil uygulama ve web istemcisi bu gateway üzerinden erişir.
#
# Auth endpoint'leri hariç tüm route'lara JWT doğrulama uygulanır.
# JWT doğrulama Kong'da yapılmaz — backend servisler TenantGuard ile yapar.
# Kong: rate limit + CORS + security headers + routing
---
# ─── Auth Service (:3001) ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-service-ingress
  namespace: enkap-production
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: rate-limit-global,cors-policy,request-id,security-headers
    # Auth endpoint'leri için özel rate limit (brute force koruması)
    konghq.com/override: auth-rate-limit
spec:
  rules:
    - host: api.enkap.com.tr
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
---
# Auth için daha sıkı rate limit (brute force)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: auth-rate-limit
  namespace: enkap-production
plugin: rate-limiting
config:
  second: 5           # /auth endpoint'leri için çok daha sıkı
  minute: 30
  policy: redis
  redis_host: redis.enkap-production.svc.cluster.local
  redis_port: 6379
---
# ─── OAuth2 / API Marketplace (:3001, auth-service) ────────────────────────
# /token: herkese açık (client credentials), auth-rate-limit uygulanır
# /clients: JWT korumalı (insan kullanıcı kendi API anahtarlarını yönetir)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth-token-ingress
  namespace: enkap-production
  annotations:
    kubernetes.io/ingress.class: kong
    # Token endpoint: brute force koruması (client_secret deneme saldırıları)
    konghq.com/plugins: rate-limit-global,cors-policy,request-id,security-headers,oauth-rate-limit
spec:
  rules:
    - host: api.enkap.com.tr
      http:
        paths:
          - path: /api/v1/oauth/token
            pathType: Exact
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth-clients-ingress
  namespace: enkap-production
  annotations:
    kubernetes.io/ingress.class: kong
    # İstemci yönetimi: plan bazlı rate limit (tenant tier üzerinden)
    konghq.com/plugins: rate-limit-global,cors-policy,request-id,security-headers,tier-based-rate-limit
spec:
  rules:
    - host: api.enkap.com.tr
      http:
        paths:
          - path: /api/v1/oauth/clients
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 3001
---
# OAuth token endpoint için özel rate limit (client_secret brute force)
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: oauth-rate-limit
  namespace: enkap-production
plugin: rate-limiting
config:
  second: 3          # /token endpoint: çok sıkı (brute force koruması)
  minute: 20
  hour: 200
  policy: redis
  redis_host: redis.enkap-production.svc.cluster.local
  redis_port: 6379
---
