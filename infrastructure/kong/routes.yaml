# Admin endpoint'leri için IP kısıtlaması
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: admin-ip-restriction
  namespace: enkap-production
plugin: ip-restriction
config:
  # Sadece VPN/office IP aralıklarına izin ver
  allow:
    - "10.0.0.0/8"       # Kubernetes cluster internal
    - "172.16.0.0/12"    # Docker/PgBouncer network
    # TODO: Production'da VPN IP bloğu eklenmeli
---
---
# Prometheus /metrics endpoint'i için IP kısıtlaması
