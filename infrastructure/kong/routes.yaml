metadata:
  name: metrics-ip-restriction
  namespace: enkap-production
plugin: ip-restriction
config:
  allow:
    - "10.0.0.0/8"       # Kubernetes cluster internal (Prometheus pod'ları)
    - "172.16.0.0/12"    # Docker network
---
# /metrics path'i için ayrı Ingress (IP kısıtlamalı, rate limit yok)
apiVersion: networking.k8s.io/v1
