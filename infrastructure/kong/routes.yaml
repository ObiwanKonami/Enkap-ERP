metadata:
  name: enkap-metrics-ingress
  namespace: enkap-production
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: metrics-ip-restriction
    konghq.com/strip-path: "false"
spec:
  rules:
    - host: api.enkap.com.tr
      http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: auth-service       # Prometheus her pod'u doğrudan scrape eder
                port: { number: 3001 }   # ServiceMonitor pod IP'lerini kullanır

---
# ─── White Label: Subdomain Wildcard Routing ─────────────────────────────────
#
# *.enkap.com.tr → Kong → tenant-service (subdomain çözümleme)
# Kong pre-function: subdomain → tenant_id → X-Tenant-ID header
# Downstream servisler X-Tenant-ID'den tenantId okur (TenantGuard bypass DEĞİL —
# TenantGuard JWT'deki tenant_id'yi kontrol eder, bu header sadece routing için).
#
# Custom domain desteği için Let's Encrypt wildcard sertifikası gerekir:
# cert-manager ile DNS-01 challenge (Cloudflare vb. DNS API ile).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: white-label-subdomain-ingress
  namespace: enkap-production
  annotations:
    kubernetes.io/ingress.class: kong
    konghq.com/plugins: rate-limit-global,cors-policy,request-id,security-headers,white-label-resolver
spec:
  rules:
    - host: "*.enkap.com.tr"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-service   # Next.js web uygulaması
                port:
                  number: 3000
---
# White Label domain çözümleme Lua pre-function plugin'i
# Subdomain veya custom domain'den tenant_id bulur, X-Tenant-ID header'ı set eder.
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: white-label-resolver
  namespace: enkap-production
plugin: pre-function
config:
  access:
    - |
      -- White Label domain çözümleme
      -- Host header'dan subdomain veya custom domain çıkarır,
      -- tenant-service resolve endpoint'ini çağırarak tenant_id bulur,
      -- upstream request'e X-Tenant-ID header'ı ekler.

      local host = kong.request.get_header("Host") or ""
      local tenant_id = nil

      -- Subdomain kontrolü: {sub}.enkap.com.tr
      local subdomain = host:match("^([^.]+)%.enkap%.com%.tr$")
      if subdomain and subdomain ~= "api" and subdomain ~= "app" and subdomain ~= "www" then
        -- Tenant-service resolve endpoint'ini çağır
        local http = require "resty.http"
        local httpc = http.new()
        httpc:set_timeout(500)  -- 500ms timeout

        local res, err = httpc:request_uri(
          "http://tenant-service.enkap-production.svc.cluster.local:3002" ..
          "/api/v1/white-label/resolve/subdomain?subdomain=" .. subdomain,
          { method = "GET" }
        )

        if res and res.status == 200 and res.body then
          local cjson = require "cjson.safe"
          local data, _ = cjson.decode(res.body)
          if data and data.tenantId then
            tenant_id = data.tenantId
          end
        elseif err then
          kong.log.warn("White label subdomain çözümleme hatası: ", err)
        end
      else
        -- Custom domain kontrolü (subdomain değilse tam domain sorgula)
        local http = require "resty.http"
        local httpc = http.new()
        httpc:set_timeout(500)

        local encoded_host = ngx.escape_uri(host)
        local res, err = httpc:request_uri(
          "http://tenant-service.enkap-production.svc.cluster.local:3002" ..
          "/api/v1/white-label/resolve/domain?domain=" .. encoded_host,
          { method = "GET" }
        )

        if res and res.status == 200 and res.body then
          local cjson = require "cjson.safe"
          local data, _ = cjson.decode(res.body)
          if data and data.tenantId then
            tenant_id = data.tenantId
          end
        elseif err then
          kong.log.warn("White label domain çözümleme hatası: ", err)
        end
      end

      -- Tenant bulunduysa header set et
      if tenant_id then
        kong.service.request.set_header("X-Tenant-ID", tenant_id)
        kong.service.request.set_header("X-White-Label", "true")
      end
---
# TLS Sertifikası — Let's Encrypt (cert-manager ile)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enkap-tls
  namespace: enkap-production
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  tls:
    - hosts:
        - api.enkap.com.tr
      secretName: enkap-tls-secret
  rules: []  # TLS için ayrı kural gerekmez — üstteki Ingress'ler kullanır
