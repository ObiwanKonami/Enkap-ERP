# PgBouncer Production Konfigürasyonu
#
# Mod: transaction (GİB/TDHP iş mantığı için en uygun)
#  - connection: Her sorgu için ayrı bağlantı (overhead fazla)
#  - transaction: Transaction süresince ayrı bağlantı (önerilen)
#  - session: Oturum boyunca ayrı bağlantı (prepared statement gerektiren ORM'lar için)
#
# NestJS TypeORM: transaction mode ile uyumlu
# UYARI: transaction mode'da SET, LISTEN, NOTIFY desteklenmez
#
# Hesaplama:
#   PostgreSQL max_connections = 200 (production)
#   Toplam servis pod'ları = ~15 (5 servis × 3 pod)
#   Servis başına pool_size = 10 → Toplam = 150 (güvenli margin)

[databases]
# Control plane veritabanı
enkap_control = host=postgres port=5432 dbname=enkap_control

# Tenant veritabanları için wildcard (schema-per-tenant Tier 2)
# Her tenant için ayrı havuz oluşturulur
enkap_* = host=postgres port=5432

[pgbouncer]
# ─── Bağlantı ───────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

# ─── Kimlik Doğrulama ───────────────────────────────────────────────────────
auth_type = scram-sha-256    # MD5 asla — SCRAM-SHA-256 kullan
auth_file = /etc/pgbouncer/userlist.txt

# ─── Havuz Ayarları ─────────────────────────────────────────────────────────
pool_mode = transaction

# Maksimum client bağlantısı (uygulama → PgBouncer)
max_client_conn = 1000

# PostgreSQL'e giden maksimum bağlantı (PgBouncer → PostgreSQL)
# pool_size × databases sayısı < PostgreSQL max_connections
default_pool_size = 20

# Minimum havuz boyutu (ısınma için hazır tutulacak bağlantı)
min_pool_size = 5

# Reserve havuzu — yük artışında hızlı yanıt için
reserve_pool_size = 5
reserve_pool_timeout = 3.0

# ─── Timeout'lar ────────────────────────────────────────────────────────────
# İstemci bağlantı bekleme süresi (havuzda bağlantı yoksa)
query_wait_timeout = 30

# Sunucu bağlantısı kurulamazsa istemciye hata dön
connect_timeout = 15

# İstemci bağlantı yaşam süresi
client_idle_timeout = 600

# PostgreSQL bağlantısının maksimum yaşı (bağlantı sızdırmayı önler)
server_lifetime = 3600

# İnaktif PostgreSQL bağlantılarını kapat
server_idle_timeout = 600

# ─── TLS ────────────────────────────────────────────────────────────────────
# İç ağ (Kubernetes pod-to-pod): Istio mTLS zaten şifreler
# PgBouncer → PostgreSQL TLS: production'da aktif olmalı
server_tls_sslmode = require
server_tls_ca_file = /etc/ssl/certs/ca-certificates.crt

# ─── Loglama ─────────────────────────────────────────────────────────────────
log_connections = 0    # Bağlantı logları kapalı (gürültülü)
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60      # Her 60 saniyede istatistik logla

# ─── Admin ──────────────────────────────────────────────────────────────────
# pgbouncer veritabanına erişen yönetici kullanıcılar
admin_users = pgbouncer_admin
stats_users = pgbouncer_monitor

# ─── Güvenlik ───────────────────────────────────────────────────────────────
# İstemci doğrulamasız TCP bağlantısı — Kubernetes ağ politikası ile korunur
ignore_startup_parameters = extra_float_digits,search_path

# Server tarafı hazır olunca bildir (PostgreSQL 14+ required)
server_check_query = select 1
server_check_delay = 30

# ─── Performans ─────────────────────────────────────────────────────────────
# Bağlantı tekrar kullanımı — transaction mode'da her transaction'dan sonra
# PostgreSQL bağlantısı havuza geri döner
tcp_keepalive = 1
tcp_keepidle = 10
tcp_keepintvl = 10
tcp_keepcnt = 3
